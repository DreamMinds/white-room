server {
    listen       80;
    server_name  localhost;
    server_tokens off;

    root  /usr/share/nginx/html;
    index index.html;

    gzip              on;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/xml application/manifest+json;

    add_header X-Content-Type-Options   "nosniff"                              always;
    add_header X-Frame-Options          "SAMEORIGIN"                           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ~* \.(?:bak|conf|ya?ml|env|sh|log)$ { deny all; }
    location ~ /\.(?!well-known) { deny all; }

    # Gehashte Vite-Assets: lange cachen
    location /assets/ {
        expires    1y;
        access_log off;
    }

    # Service Worker & Manifest: nie cachen, sonst kommen App-Updates nicht an
    location = /sw.js          { expires -1; }
    location = /manifest.webmanifest {
        types { application/manifest+json webmanifest; }
        default_type application/manifest+json;
        expires -1;
    }

    # SPA-Fallback: alle Routen auf index.html
    location / {
        expires    -1;
        try_files $uri $uri/ /index.html;
    }
}
